<!--CSS Box Model-->
<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="style.css">
  <style>
    .box {
      width: 200px;
      padding: 50px;
      border: 10px solid red;
      margin: 100px;
      background-color: lightblue;
    }
  </style>
</head>

<body>

  <div class="box" style="color: blue;">
    This is a box model example.
  </div>

  <!--Exercise 1-->
  <div class="one"></div>
  <div class="two"></div>
  <h1 style="display: inline; background-color: yellow;">Hi</h1>
  <h1 style="display: inline; background-color: red;">Bye</h1><br>
  <hr>

  <!--Exercise 2-->
  <style>
    li {
      background-color: black;
      color: white;
      display: inline;
      padding: 10px;
      margin: 5px;
    }
  </style>
  <ul>
    <li>Home</li>
    <li>About US</li>
    <li>Contact US</li>
  </ul>
</body>

</html>
